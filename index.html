<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Highscore Gaming</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Orbitron', sans-serif;
  background: radial-gradient(ellipse at top, #1a001a 0%, #0a0010 100%);
  color: #fff;
  height: 100vh;
  overflow: hidden;
}

html, body { height: 100%; width: 100%; overflow: hidden; }

/* ===== SCREENS ===== */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.screen.hidden { display: none !important; }

/* ===== HOME SCREEN ===== */
#screen-home { overflow: hidden; }

#home-header {
  padding: 14px 16px 10px;
  text-align: center;
  background: rgba(0,0,0,0.5);
  border-bottom: 1px solid #f0f4;
  flex-shrink: 0;
}

#home-logo {
  height: 44px;
  object-fit: contain;
  margin-bottom: 4px;
  display: block;
  margin: 0 auto 4px;
}

#home-subtitle {
  font-size: 10px;
  color: #f0f8;
  letter-spacing: 2px;
}

#game-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
  overflow-y: auto;
  flex: 1;
}

.game-card {
  background: rgba(40, 0, 80, 0.7);
  border: 1px solid #f0f4;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative;
}

.game-card:active { transform: scale(0.96); }
.game-card:hover { box-shadow: 0 0 16px #f0f5; border-color: #f0f9; }

.game-card-thumb {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
  display: block;
  background: #1a001a;
}

.game-card-thumb-fallback {
  width: 100%;
  aspect-ratio: 16/9;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  background: linear-gradient(135deg, #1a001a, #2a0050);
}

.game-card-title {
  padding: 8px 10px;
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 0 8px #000, 0 0 4px #000;
  letter-spacing: 0.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  background: rgba(10, 0, 30, 0.85);
}

.play-badge {
  position: absolute;
  top: 7px;
  right: 7px;
  background: linear-gradient(135deg, #f0f, #a0f);
  color: #fff;
  font-size: 8px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 20px;
  box-shadow: 0 0 8px #f0f8;
  letter-spacing: 1px;
}

/* ===== PRE-GAME SCREEN ===== */
#screen-pregame { background: rgba(10, 0, 20, 0.98); }

#pregame-back {
  padding: 13px 16px;
  cursor: pointer;
  font-size: 12px;
  color: #f0f;
  background: rgba(0,0,0,0.5);
  border-bottom: 1px solid #f0f3;
  flex-shrink: 0;
  letter-spacing: 1px;
}
#pregame-back:hover { color: #fff; }

#pregame-content {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 14px 24px;
  gap: 14px;
}

#pregame-thumb {
  width: 100%;
  max-width: 380px;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid #f0f4;
  box-shadow: 0 0 20px #f0f3;
}
#pregame-thumb img { width: 100%; display: block; }

#pregame-title {
  font-size: 18px;
  font-weight: 700;
  text-align: center;
  text-shadow: 0 0 10px #f0f;
  letter-spacing: 1px;
}

#pregame-rank-box {
  background: rgba(40, 0, 80, 0.6);
  border: 1px solid #f0f4;
  border-radius: 12px;
  padding: 12px 20px;
  width: 100%;
  max-width: 380px;
  text-align: center;
}

#pregame-rank-label {
  font-size: 10px;
  color: #f0f8;
  letter-spacing: 1.5px;
  margin-bottom: 6px;
}

#pregame-rank-value {
  font-size: 26px;
  font-weight: 700;
  color: #00f0ff;
  text-shadow: 0 0 10px #00f0ff;
}

#pregame-top3 {
  width: 100%;
  max-width: 380px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.pregame-entry {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(40,0,80,0.5);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 13px;
}
.pregame-entry .pe-rank { width: 26px; flex-shrink: 0; text-align: center; font-size: 18px; }
.pregame-entry .pe-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pregame-entry .pe-score { color: #00f0ff; font-weight: 700; flex-shrink: 0; font-size: 12px; }

#pregame-play-btn {
  font-family: 'Orbitron', sans-serif;
  font-size: 17px;
  font-weight: 700;
  padding: 14px 0;
  color: #fff;
  background: linear-gradient(135deg, #f0f, #a0f);
  border: none;
  border-radius: 12px;
  box-shadow: 0 0 24px #f0f8;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  letter-spacing: 1px;
  width: 100%;
  max-width: 380px;
}
#pregame-play-btn:hover { transform: scale(1.03); box-shadow: 0 0 32px #f0fb; }

/* ===== GAME SCREEN ===== */
#screen-game { overflow: hidden; }

#unity-container {
  position: absolute;
  inset: 0;
  background: #111;
  z-index: 0;
}
#unity-canvas {
  width: 100%; height: 100%;
  display: block; background: #222; border: none;
}

.ui-overlay {
  position: absolute;
  inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  background: rgba(30, 0, 60, 0.6);
  backdrop-filter: blur(8px);
  transition: transform 0.4s ease;
}
.ui-overlay.hidden { transform: translateY(100%); }

.tabs {
  height: 50px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  background: rgba(0,0,0,0.6);
  border-bottom: 2px solid #222;
}

.tab-back {
  padding: 0 14px;
  height: 100%;
  display: flex;
  align-items: center;
  cursor: pointer;
  color: #f0f;
  font-size: 20px;
  border-right: 1px solid #f0f3;
  flex-shrink: 0;
}
.tab-back:hover { color: #fff; }

.tabs-list {
  display: flex;
  flex: 1;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs-list::-webkit-scrollbar { display: none; }

.tab {
  padding: 12px 16px;
  cursor: pointer;
  font-size: 13px;
  color: #f0f;
  font-weight: bold;
  white-space: nowrap;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
}
.tab:hover { color: #fff; border-color: #f0f4; }
.tab.active { color: #fff; border-color: #f0f; text-shadow: 0 0 6px #f0f; }

.leaderboard-scroll-container {
  flex: 1;
  overflow-y: auto;
  width: 100%;
  padding: 10px 0;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#limit-select {
  margin: 10px auto;
  display: block;
  background: #111;
  color: #f0f;
  font-family: 'Orbitron', sans-serif;
  border: 1px solid #f0f;
  border-radius: 8px;
  padding: 6px 12px;
}

#leaderboard {
  width: 100%;
  max-width: 600px;
  padding: 10px 5vw;
  margin: 0 auto;
  background: rgba(40, 0, 80, 0.6);
  border-radius: 16px;
  box-shadow: 0 0 25px #f0f8;
  box-sizing: border-box;
}

.entry {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 8px 0;
  font-size: 14px;
  color: #fff;
  text-shadow: 0 0 5px #f0f8;
  width: 100%;
  box-sizing: border-box;
  gap: 12px;
}
.rank-number { width: 24px; flex-shrink: 0; text-align: center; }
.medal-emoji { font-size: 20px; line-height: 1; }
.avatar {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  background-size: cover; background-position: center;
  box-shadow: 0 0 6px #f0f5;
}
.name-span {
  flex: 1; min-width: 0; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; padding: 0 4px;
}
.score-span { width: 64px; flex-shrink: 0; text-align: right; }
.entry:nth-child(1) { color: gold; font-weight: bold; }
.entry:nth-child(2) { color: silver; font-weight: bold; }
.entry:nth-child(3) { color: #cd7f32; font-weight: bold; }
.entry:nth-child(n+4) .name-span { color: #00f0ff; font-weight: bold; }

#game-start-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#start-logo {
  max-width: 80vw; max-height: 30vh;
  object-fit: contain; margin-bottom: 16px;
}

#play-button-container {
  height: 70px;
  flex-shrink: 0;
  padding: 12px 0;
  text-align: center;
  background: rgba(30,0,60,0.6);
}
#play-button {
  font-family: 'Orbitron', sans-serif;
  font-size: 18px;
  padding: 12px 28px;
  color: #fff;
  background: linear-gradient(135deg, #f0f, #a0f);
  border: none;
  border-radius: 10px;
  box-shadow: 0 0 20px #f0f8;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
#play-button:hover { transform: scale(1.05); box-shadow: 0 0 25px #f0fb; }
#play-button:disabled { opacity: 0.7; cursor: default; transform: none; }

body.fullscreen .ui-overlay { transform: translateY(100%); }

#hud-btn {
  display: none;
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 100;
  background: rgba(30,0,60,0.85);
  border: 1px solid #f0f6;
  border-radius: 10px;
  color: #f0f;
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  font-weight: 700;
  padding: 8px 12px;
  cursor: pointer;
  letter-spacing: 1px;
  box-shadow: 0 0 10px #f0f4;
}
body.fullscreen #hud-btn { display: block; }
  </style>
</head>

</div>

  highscore_heroes: {

      codeUrl: "/highscoreheroes/Build/highscoreheroes.wasm",

    }

};

// ===== TELEGRAM / URL PARAMS =====
const urlParams = new URLSearchParams(window.location.search);
const tg = window.Telegram?.WebApp;
const tgUser = tg?.initDataUnsafe?.user || {};

const telegramId = tgUser.id || "";
const username   = tgUser.username || "";
const firstName  = tgUser.first_name || "";
const lastName   = tgUser.last_name || "";

function getStartParamData() {
  let param = urlParams.get('startapp') || urlParams.get('start_param');
  if (!param && tg?.initDataUnsafe?.start_param) param = tg.initDataUnsafe.start_param;
  if (!param) return null;
  let b64 = param.replace(/-/g, '+').replace(/_/g, '/');
  while (b64.length % 4) b64 += '=';
  try { return JSON.parse(atob(b64)); } catch(e) { return null; }
}

const startData = getStartParamData();
let chatId = startData?.chatId || "";
let selectedGameId = startData?.gameId || "";

// ===== UTILITIES =====
const baseURL = "https://highscoregamingbot.pythonanywhere.com";

function formatScore(n) {
  n = Number(n) || 0;
  const abs = Math.abs(n);
  if (abs >= 1e9) return (n / 1e9).toFixed(1) + "B";
  if (abs >= 1e6) return (n / 1e6).toFixed(1) + "M";
  if (abs >= 1e3) return Math.round(n / 1e3) + "K";
  return String(n);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ===== HOME SCREEN =====
function buildHomeScreen() {
  const grid = document.getElementById('game-grid');
  grid.innerHTML = '';
  Object.entries(GAMES).forEach(([id, game]) => {
    const card = document.createElement('div');
    card.className = 'game-card';
    card.innerHTML = `
      <div class="play-badge">PLAY</div>
      <img class="game-card-thumb" src="${game.thumbnail}" alt="${game.title}"
           onerror="this.outerHTML='<div class=\\'game-card-thumb-fallback\\'>${game.emoji}</div>'">
      <div class="game-card-title">${game.title}</div>
    `;
    card.addEventListener('click', () => selectGame(id));
    grid.appendChild(card);
  });
}

// ===== SELECT GAME → PRE-GAME SCREEN =====
function selectGame(gameId) {
  selectedGameId = gameId;
  const game = GAMES[gameId];
  if (!game) return;

  document.getElementById('pregame-title').textContent = game.title;
  document.getElementById('pregame-thumb-img').src = game.thumbnail;
  document.getElementById('pregame-rank-value').textContent = '—';
  document.getElementById('pregame-top3').innerHTML =
    '<div style="color:#f0f8;font-size:11px;text-align:center;letter-spacing:1px">Loading rankings...</div>';

  showScreen('screen-pregame');
  loadPregameData(gameId);
}

async function loadPregameData(gameId) {
  const rankEl = document.getElementById('pregame-rank-value');
  const top3El = document.getElementById('pregame-top3');

  try {
    const endpoint = chatId
      ? `${baseURL}/leaderboard?game_id=${gameId}&chat_id=${chatId}&limit=50`
      : `${baseURL}/global_alltime_leaderboard?game_id=${gameId}&limit=10`;

    const res = await fetch(endpoint);
    const data = await res.json();
    const scores = (data.scores || []).filter(e => {
      const name = [e.first_name, e.last_name].filter(Boolean).join(' ').trim() || e.username || '';
      return name && name !== '—' && isNaN(name);
    });

    // Find user's best score in alltime leaderboard
    let myScore = null;
    if (telegramId) {
      try {
        const atRes = await fetch(`${baseURL}/alltime_leaderboard?game_id=${gameId}&chat_id=${chatId}&limit=200`);
        const atData = await atRes.json();
        const myEntry = (atData.scores || []).find(e => String(e.telegram_id) === String(telegramId));
        if (myEntry) myScore = myEntry.score ?? myEntry.points ?? null;
      } catch(e) {}
    }

    if (myScore !== null) {
      rankEl.textContent = formatScore(myScore);
      rankEl.style.color = '#00f0ff';
      rankEl.style.fontSize = '26px';
    } else {
      rankEl.textContent = 'No score yet';
      rankEl.style.color = '#f0f8';
      rankEl.style.fontSize = '14px';
    }

    // Top 3
    const medals = ['🥇', '🥈', '🥉'];
    const top3 = scores.slice(0, 3);
    if (top3.length === 0) {
      top3El.innerHTML = '<div style="color:#f0f8;font-size:11px;text-align:center">No scores yet — be first!</div>';
      return;
    }
    top3El.innerHTML = top3.map((e, i) => {
      const name = [e.first_name, e.last_name].filter(Boolean).join(' ') || e.username || '—';
      return `<div class="pregame-entry">
        <span class="pe-rank">${medals[i]}</span>
        <span class="pe-name">${name}</span>
        <span class="pe-score">${formatScore(e.score ?? e.points ?? 0)}</span>
      </div>`;
    }).join('');
  } catch(e) {
    rankEl.textContent = '—';
    top3El.innerHTML = '<div style="color:#f0f8;font-size:11px;text-align:center">Could not load rankings</div>';
  }
}

// ===== PRE-GAME → GAME =====
let unityInstance = null;
let isLoaded = false;
let loadedGameId = null;

document.getElementById('pregame-play-btn').addEventListener('click', () => {
  // If a different game is already loaded, reload the page for the new game
  if (loadedGameId && loadedGameId !== selectedGameId) {
    const payload = JSON.stringify({ gameId: selectedGameId, chatId: chatId });
    const b64 = btoa(payload).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    window.location.href = 'index.html?startapp=' + b64;
    return;
  }
  showScreen('screen-game');
  if (!loadedGameId) loadUnityGame(selectedGameId);
});

function loadUnityGame(gameId) {
  loadedGameId = gameId;
  const game = GAMES[gameId];
  if (!game) return;

  const canvas = document.getElementById('unity-canvas');
  const playBtn = document.getElementById('play-button');
  const unityData = `${telegramId};${username};${chatId};${firstName};${lastName};${gameId}`;

  if (game.gameConfig) window.GAME_CONFIG = game.gameConfig;

  playBtn.disabled = true;
  playBtn.textContent = '⏳ Loading...';

  const script = document.createElement('script');
  script.src = game.loaderUrl;
  script.onload = () => {
    createUnityInstance(canvas, game.config, () => {})
      .then(instance => {
        unityInstance = instance;
        instance.SendMessage("TelegramParams", "SetTelegramUserData", unityData);
        playBtn.textContent = '⏳ Game starting...';
        setTimeout(() => {
          playBtn.disabled = false;
          playBtn.textContent = '▶️ Play';
          isLoaded = true;
        }, 2500);
      })
      .catch(err => {
        playBtn.textContent = '❌ ' + err;
        playBtn.disabled = false;
      });
  };
  document.body.appendChild(script);
}

// ===== PLAY BUTTON =====
document.getElementById('play-button').addEventListener('click', () => {
  if (!isLoaded) return;
  const overlay = document.getElementById('ui-overlay');
  overlay.classList.add('hidden');
  document.body.classList.add('fullscreen');
  setTimeout(() => { overlay.style.display = 'none'; }, 600);
});

// ===== HUD MENU BUTTON (during fullscreen gameplay) =====
document.getElementById('hud-btn').addEventListener('click', () => {
  const overlay = document.getElementById('ui-overlay');
  overlay.style.display = '';
  overlay.classList.remove('hidden');
  document.body.classList.remove('fullscreen');
});

// ===== BACK BUTTONS =====
document.getElementById('pregame-back').addEventListener('click', () => {
  showScreen('screen-home');
});

document.getElementById('game-back').addEventListener('click', () => {
  // Restore overlay for when user comes back to game screen
  const overlay = document.getElementById('ui-overlay');
  overlay.style.display = '';
  overlay.classList.remove('hidden');
  document.body.classList.remove('fullscreen');
  showScreen('screen-home');
});

// ===== LEADERBOARD =====
const lbEl = document.getElementById('leaderboard');
const lbContainer = document.getElementById('leaderboard-container');
const limitSelect = document.getElementById('limit-select');
let limit = 10;
let activeTab = 'leaderboard';

function buildEndpoints() {
  return {
    leaderboard: `/leaderboard?game_id=${selectedGameId}&chat_id=${chatId}&limit=${limit}`,
    alltime:     `/alltime_leaderboard?game_id=${selectedGameId}&chat_id=${chatId}&limit=${limit}`,
    global:      `/global_alltime_leaderboard?game_id=${selectedGameId}&limit=${limit}`,
    chat:        `/alltime_chat_leaderboard?game_id=${selectedGameId}&limit=${limit}`
  };
}

function loadLeaderboard(tabKey) {
  activeTab = tabKey;
  lbEl.innerHTML = 'Loading...';
  const endpoints = buildEndpoints();

  fetch(baseURL + endpoints[tabKey])
    .then(res => { if (!res.ok) throw new Error(`HTTP ${res.status}`); return res.json(); })
    .then(data => {
      const scores = (data.scores || []).filter(entry => {
        const name = [entry.first_name, entry.last_name].filter(Boolean).join(' ').trim() || entry.chat_title || '';
        return name && isNaN(name) && name !== '—';
      });
      lbEl.innerHTML = '';
      if (scores.length === 0) { lbEl.textContent = 'No scores yet!'; return; }

      scores.forEach((entry, index) => {
        const div = document.createElement('div');
        div.className = 'entry';
        const rank = index + 1;

        const rankSpan = document.createElement('span');
        rankSpan.className = 'rank-number';
        if (rank <= 3) {
          rankSpan.innerHTML = `<span class="medal-emoji">${['🥇','🥈','🥉'][rank-1]}</span>`;
        } else {
          rankSpan.textContent = rank.toString();
        }

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        if (tabKey === 'chat' && entry.chat_title && !/^\d+$/.test(entry.chat_title)) {
          avatar.style.backgroundImage = `url('${baseURL}/group_avatar/${entry.chat_id}')`;
        } else if (entry.username) {
          avatar.style.backgroundImage = `url('https://t.me/i/userpic/320/${entry.username}.jpg')`;
        } else {
          avatar.textContent = (entry.first_name || '?')[0];
          avatar.style.cssText += ';background:#444;color:#f0f;text-align:center;line-height:32px;font-size:14px';
        }
        avatar.style.backgroundSize = 'cover';
        avatar.style.backgroundPosition = 'center';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'name-span';
        nameSpan.textContent = [entry.first_name, entry.last_name].filter(Boolean).join(' ')
          || entry.username || entry.chat_title || '—';

        const scoreSpan = document.createElement('span');
        scoreSpan.className = 'score-span';
        scoreSpan.textContent = formatScore(entry.score ?? entry.points ?? 0);

        div.appendChild(rankSpan);
        div.appendChild(avatar);
        div.appendChild(nameSpan);
        div.appendChild(scoreSpan);
        lbEl.appendChild(div);
      });
    })
    .catch(() => { lbEl.textContent = '❌ Failed to load'; });
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('game-start-screen').style.display = 'none';
    lbContainer.style.display = 'flex';
    document.querySelector('.tab.active')?.classList.remove('active');
    btn.classList.add('active');
    loadLeaderboard(btn.dataset.tab);
  });
});

limitSelect.addEventListener('change', e => {
  limit = parseInt(e.target.value);
  loadLeaderboard(activeTab);
});

// ===== INIT =====
buildHomeScreen();

if (selectedGameId && GAMES[selectedGameId]) {
  // Launched from Telegram with startapp → go straight to game screen and load Unity
  showScreen('screen-game');
  loadUnityGame(selectedGameId);
} else {
  showScreen('screen-home');
}
</script>
</body>
</html>
